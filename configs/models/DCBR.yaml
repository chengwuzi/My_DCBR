MealRec+H:
  # CBDM / diffusion base settings
  use_blcc: True
  export_cbdm_analysis: False
  dims: [1000]
  norm: False
  time_emb_dim: 10
  steps: 5
  noise_scale: 1.0
  noise_min: 0.0001
  noise_max: 0.02
  sampling_noise: False
  sampling_steps: 0
  rebuild_k: 1
  lambda_0: 1.0e+3
  use_weighted_cbdm_input: False
  weighted_cbdm_user_embedding_path: ''
  weighted_cbdm_bundle_embedding_path: ''
  weighted_cbdm_input_gamma: 1.0
  weighted_cbdm_input_eps: 0.1

  # Weight-matrix experiment switches
  # Keep disabled unless running a specific ablation on external UB weights.
  use_weight_matrix_rebuild: False
  use_weight_matrix_prune_bottomk: False
  use_observed_ub_rebuild_mask: False
  use_weight_matrix_random_subset: False
  weight_matrix_path: ''
  weight_matrix_prune_k: 0
  weight_matrix_random_subset_min_k: 2
  weight_matrix_random_subset_max_k: 3

  # Weight-matrix keep-bottom-k rebuild
  # Keeps the lowest-weight observed U-B edges, with optional epoch-wise random subset sampling.
  use_weight_matrix_keep_bottomk_rebuild: False
  weight_matrix_keep_bottomk_k: 0
  use_weight_matrix_keep_bottomk_random_subset: False
  weight_matrix_keep_bottomk_random_subset_min_k: 2
  weight_matrix_keep_bottomk_random_subset_max_k: 3

  # Masked Bundle Modeling rebuild on external LightGCN embeddings
  use_mbm_rebuild: False
  mbm_user_embedding_path: ''
  mbm_bundle_embedding_path: ''
  mbm_hidden_dim: 128
  mbm_dropout: 0.1
  mbm_phi_layers: 2
  mbm_rho_layers: 2
  mbm_scorer_layers: 2
  mbm_mask_ratio: 0.3
  mbm_neg_num: 50
  mbm_lr: 1.0e-3
  mbm_weight_decay: 1.0e-5
  mbm_batch_size: 1024
  mbm_infer_batch_size: 1024
  mbm_score_mode: 'hybrid'
  mbm_anchor_lambda: 0.5
  mbm_contribution_metric: 'context_shift'

  # Anchor-conditioned reconstruction rebuild on external LightGCN embeddings
  use_anchor_rebuild: False
  anchor_user_embedding_path: ''
  anchor_bundle_embedding_path: ''
  anchor_hidden_dim: 128
  anchor_dropout: 0.1
  anchor_encoder_layers: 2
  anchor_scorer_layers: 2
  anchor_neg_num: 50
  anchor_lr: 1.0e-3
  anchor_weight_decay: 1.0e-5
  anchor_batch_size: 1024
  anchor_infer_batch_size: 256
  anchor_eval_chunk_size: 16

  # DCBR encoder / objective settings
  num_layers: 2
  upsilon_UB: 0.0
  upsilon_UI: 0.0
  upsilon_BI: 0.3
  xi_UB: [0.6, 0.25, 0.15]
  xi_UI: [0.35, 0.6, 0.05]
  xi_BI: [0.55, 0.45, 0.0]
  omega: 0.1

  gamma_1: 0.3
  gamma_2: 0.05
  tau: 0.2
  lambda_1: 0.02
  lambda_2: 1.0e-5
  epochs: 150


