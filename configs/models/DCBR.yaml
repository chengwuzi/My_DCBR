iFashion:
  rebuild_k: 3

  # Set-conditioned latent diffusion rebuild on external LightGCN embeddings
  use_latent_diffusion_rebuild: True
  latent_diffusion_user_embedding_path: './weightMatrix/ifashion_gcn_emb/user_emb.pt'
  latent_diffusion_bundle_embedding_path: './weightMatrix/ifashion_gcn_emb/bundle_emb.pt'
  latent_diffusion_hidden_dim: 128
  latent_diffusion_time_dim: 16
  latent_diffusion_denoiser_layers: 2
  latent_diffusion_dropout: 0.1
  latent_diffusion_num_steps: 12
  latent_diffusion_num_slots: 4
  latent_diffusion_score_agg: 'max'
  latent_diffusion_diversity_weight: 1.0e-3
  latent_diffusion_beta_start: 1.0e-4
  latent_diffusion_beta_end: 0.02
  latent_diffusion_set_loss_weight: 0.05
  latent_diffusion_lr: 1.0e-3
  latent_diffusion_weight_decay: 1.0e-5
  latent_diffusion_batch_size: 1024
  latent_diffusion_infer_batch_size: 256
  latent_diffusion_reset_after_epoch: -1
  latent_diffusion_reset_optimizer: False

  # DCBR encoder / objective settings
  num_layers: 2
  upsilon_UB: 0.05
  upsilon_UI: 0.0
  upsilon_BI: 0.2
  xi_UB: [0.5, 0.5, 0.0]
  xi_UI: [0.3, 0.4, 0.3]
  xi_BI: [0.5, 0.5, 0.0]
  omega: 0.5

  gamma_1: 0.3
  gamma_2: 0.2
  tau: 0.08
  lambda_1: 0.3
  lambda_2: 1.0e-6
  epochs: 20
